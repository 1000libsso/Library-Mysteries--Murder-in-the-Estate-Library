<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Library Mysteries — CCTV Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Colors */
    --color-grey: rgb(81, 81, 81);
    --color-near-black: rgb(11, 11, 11);
    --color-black: rgb(0, 0, 0);
    --color-white: rgb(255, 255, 255);
    --color-input-border: rgb(221, 221, 221);
    --color-placeholder: rgb(153, 153, 153);

    /* Typography */
    --font-sans: "Noto Sans", "Helvetica Neue", Arial, sans-serif;

    --fs-heading: 18px;
    --fs-input: 16px;
    --fs-button: 16px;
    --fs-footnote: 10px;

    /* Layout */
    --frame-w: 400px;
    --frame-h: 990px;
    --grey-h: 600px;
  }

  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    height: 100%;
  }

  body {
    font-family: var(--font-sans);
    background-color: var(--color-black);
    color: var(--color-white);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }

  /* ───────────── Page frame ───────────── */
  .page {
    position: relative;
    width: var(--frame-w);
    height: var(--frame-h);
    max-width: 100%;
    overflow: hidden;
    background-color: var(--color-black);
  }

  /* ───────────── Grey section ───────────── */
  .grey-section {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: var(--grey-h);
    background-color: var(--color-grey);
  }

  .logo {
    position: absolute;
    left: 50%;
    top: 27px;
    transform: translateX(-50%);
    width: 52px;
    height: 56px;
    object-fit: contain;
    user-select: none;
  }

  .heading {
    position: absolute;
    left: 50%;
    top: 149px;
    transform: translateX(-50%);
    width: 220px;
    height: 51px;
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: var(--fs-heading);
    line-height: 1.4;
    text-align: center;
    color: var(--color-white);
  }

  /* ───────────── Password form ───────────── */
  .form {
    position: absolute;
    left: 50%;
    top: 220px;
    transform: translateX(-50%);
    width: 272px;
    display: flex;
    flex-direction: column;
    gap: 21px;
  }

  .form__input {
    width: 100%;
    height: 38px;
    border-radius: 5px;
    background-color: var(--color-white);
    border: 1px solid var(--color-input-border);
    padding: 4px 12px;
    font-family: var(--font-sans);
    font-size: var(--fs-input);
    line-height: 1.4;
    color: var(--color-black);
    outline: none;
  }

  .form__input::placeholder {
    color: var(--color-placeholder);
    opacity: 1;
  }

  .form__input:focus {
    border-color: var(--color-near-black);
  }

  .form__submit {
    width: 100%;
    height: 47px;
    border-radius: 5px;
    background-color: var(--color-near-black);
    border: none;
    padding: 12px 40px;
    font-family: var(--font-sans);
    font-weight: 400;
    font-size: var(--fs-button);
    line-height: 1.4;
    color: var(--color-white);
    text-align: center;
    cursor: pointer;
  }

  .form__submit:hover {
    opacity: 0.92;
  }

  .form__submit:active {
    opacity: 0.85;
  }

  /* ───────────── Black footer ───────────── */
  .footer {
    position: absolute;
    left: 0;
    top: var(--grey-h);
    width: 100%;
    height: calc(var(--frame-h) - var(--grey-h));
    background-color: var(--color-black);
    padding: 30px 24px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .footer__lock {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1.5px solid var(--color-white);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }

  .footer__lock svg {
    width: 20px;
    height: 20px;
    display: block;
  }

  .footer__note {
    width: 243px;
    font-family: var(--font-sans);
    font-weight: 400;
    font-size: var(--fs-footnote);
    line-height: 1.6;
    text-align: center;
    color: var(--color-white);
  }

  /* ───────────── Responsive (mobile, max 768px) ───────────── */
  @media (max-width: 768px) {
    .page {
      width: 100vw;
      height: calc(100vw * (990 / 400));
      max-width: 400px;
      max-height: 990px;
    }
  }
</style>
</head>
<body>
  <main class="page" aria-label="Library Mysteries — CCTV Password">
    <section class="grey-section" aria-labelledby="cctv-heading">
      <img
        class="logo"
        src="assets/cctv-logo.png"
        alt="CCTV logo"
      />

      <h1 class="heading" id="cctv-heading">Please enter your password to get access.</h1>

      <form class="form" id="cctv-form" novalidate>
        <label for="cctv-password" class="visually-hidden" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;">Password</label>
        <input
          class="form__input"
          type="password"
          id="cctv-password"
          name="password"
          placeholder="Password"
          autocomplete="current-password"
        />
        <button class="form__submit" type="submit">Submit</button>
      </form>
    </section>

    <footer class="footer">
      <div class="footer__lock" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="color:#ffffff;">
          <rect x="5" y="11" width="14" height="10" rx="1.5"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          <circle cx="12" cy="16" r="1.2" fill="currentColor"/>
        </svg>
      </div>
      <p class="footer__note">This content is password-protected. Please verify with a password to unlock the content.</p>
    </footer>
  </main>

  <script>
    (function () {
      var form = document.getElementById('cctv-form');
      var input = document.getElementById('cctv-password');
      if (!form || !input) return;
      var CORRECT = 'Shakespeare';
      form.addEventListener('submit', function (event) {
        event.preventDefault();
        var value = input.value.trim();
        if (value === CORRECT) {
          window.location.href = 'cctv-access-granted.html';
        } else {
          window.location.href = 'cctv-access-denied.html';
        }
      });
    })();
  </script>
</body>
</html>
