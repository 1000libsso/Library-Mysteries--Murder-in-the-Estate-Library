<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Library Mysteries — The Murderer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=PT+Sans+Caption&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://use.typekit.net/jeu0bdl.css" />
<style>
  :root {
    /* Colors */
    --color-black: rgb(0, 0, 0);
    --color-white: rgb(255, 255, 255);
    --color-overlay: rgba(0, 0, 0, 0.45);

    /* Typography */
    --font-typewriter: "secret-service-typewriter", "Courier New", monospace;
    --font-caption: "PT Sans Caption", sans-serif;

    --fs-title: 27px;
    --fs-body: 16px;
    --fs-button: 20px;

    /* Spacing */
    --header-height: 95px;
    --logo-left: 18px;
    --logo-top: 15px;
    --logo-w: 147px;
    --logo-h: 67.5px;

    --panel-top: 121px;
    --panel-left: 30px;
    --panel-w: 340px;
    --panel-h: 685px;
    --panel-inner-pad: 31px;

    --image-w: 280px;
    --image-h: 169px;

    --btn-w: 268px;
    --btn-h: 58px;

    --frame-w: 400px;
    --frame-h: 990px;
  }

  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    height: 100%;
  }

  body {
    font-family: var(--font-caption);
    background-color: var(--color-black);
    color: var(--color-white);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }

  /* ───────────── Page frame ───────────── */
  .page {
    position: relative;
    width: var(--frame-w);
    height: var(--frame-h);
    max-width: 100%;
    overflow: hidden;
    background-color: var(--color-black);
  }

  .page__bg {
    position: absolute;
    left: 0;
    top: -6px;
    width: 400px;
    height: var(--frame-h);
    object-fit: cover;
    object-position: center;
    z-index: 0;
    user-select: none;
    pointer-events: none;
  }

  .page__overlay {
    position: absolute;
    inset: 0;
    width: var(--frame-w);
    height: var(--frame-h);
    background-color: var(--color-overlay);
    z-index: 1;
  }

  /* ───────────── Header ───────────── */
  .header {
    position: absolute;
    left: 0;
    top: 0;
    width: var(--frame-w);
    height: var(--header-height);
    background-color: var(--color-black);
    overflow: hidden;
    z-index: 3;
  }

  .header__logo {
    position: absolute;
    left: var(--logo-left);
    top: var(--logo-top);
    width: var(--logo-w);
    height: var(--logo-h);
    object-fit: cover;
    user-select: none;
  }

  /* ───────────── Main content card ───────────── */
  .card {
    position: absolute;
    left: var(--panel-left);
    top: var(--panel-top);
    width: var(--panel-w);
    height: var(--panel-h);
    background-color: #bf000e;
    z-index: 2;
  }

  .card__image {
    position: absolute;
    left: 30px;
    top: 30px;
    width: var(--image-w);
    height: var(--image-h);
    object-fit: cover;
    user-select: none;
  }

  .card__title {
    position: absolute;
    left: var(--panel-inner-pad);
    top: 229px; /* 350 - 121 */
    width: 278px;
    height: 28px;
    font-family: var(--font-typewriter);
    font-weight: 400;
    font-size: var(--fs-title);
    line-height: 100%;
    text-align: center;
    color: var(--color-white);
  }

  .card__description {
    position: absolute;
    left: var(--panel-inner-pad);
    top: 286px; /* 407 - 121 */
    width: 278px;
    height: 49px;
    font-family: var(--font-caption);
    font-weight: 400;
    font-size: var(--fs-body);
    line-height: 20px;
    text-align: center;
    color: var(--color-white);
  }

  /* ───────────── Buttons ───────────── */
  .button {
    position: absolute;
    left: 36px;
    width: var(--btn-w);
    height: var(--btn-h);
    background-color: var(--color-white);
    border: none;
    padding: 19px 1px;
    display: flex;
    flex-direction: row;
    gap: 10px;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    font-family: var(--font-typewriter);
    font-weight: 400;
    font-size: var(--fs-button);
    line-height: 100%;
    text-align: center;
    color: var(--color-black);
    text-decoration: none;
  }

  .button:hover {
    opacity: 0.9;
  }

  .button:active {
    opacity: 0.8;
  }

  .button--1 { top: 361px; /* 482 - 121 */ }
  .button--2 { top: 438px; }
  .button--3 { top: 515px; }
  .button--4 { top: 592px; }

  .button__label {
    display: inline-block;
    height: 21px;
  }

  /* ───────────── Audio toggle ───────────── */
  .audio-toggle {
    position: absolute;
    top: 32px;
    right: 18px;
    z-index: 4;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1.5px solid var(--color-white);
    background-color: transparent;
    color: var(--color-white);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
  }

  .audio-toggle:hover { opacity: 0.85; }
  .audio-toggle svg { width: 16px; height: 16px; display: block; }
  .audio-toggle .icon--mute { display: none; }
  .audio-toggle.is-muted .icon--sound { display: none; }
  .audio-toggle.is-muted .icon--mute { display: block; }

  /* ───────────── Responsive (mobile, max 768px) ───────────── */
  @media (max-width: 768px) {
    .page {
      width: 100vw;
      height: calc(100vw * (990 / 400));
      max-width: 400px;
      max-height: 990px;
    }
  }
</style>
</head>
<body>
  <main class="page" aria-label="Library Mysteries — The Murderer">
    <img
      class="page__bg"
      src="assets/background.png"
      alt=""
      role="presentation"
    />
    <div class="page__overlay" aria-hidden="true"></div>

    <header class="header">
      <img
        class="header__logo"
        src="assets/logo.png"
        alt="Library Mysteries logo"
      />
      <button class="audio-toggle" id="audio-toggle" type="button" aria-label="Toggle background music" aria-pressed="true">
        <svg class="icon--sound" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="4 9 8 9 13 5 13 19 8 15 4 15" fill="currentColor"/>
          <path d="M16 8.5a4 4 0 0 1 0 7"/>
          <path d="M18.5 6a7 7 0 0 1 0 12"/>
        </svg>
        <svg class="icon--mute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="4 9 8 9 13 5 13 19 8 15 4 15" fill="currentColor"/>
          <line x1="16" y1="8" x2="22" y2="14"/>
          <line x1="22" y1="8" x2="16" y2="14"/>
        </svg>
      </button>
    </header>

    <audio id="bg-music" src="assets/page-3c-music.mp3" loop preload="auto"></audio>

    <section class="card" aria-labelledby="card-title">
      <img
        class="card__image"
        src="assets/objective3.png"
        alt="Final case investigation scene"
      />

      <h1 class="card__title" id="card-title">Solve the case</h1>

      <p class="card__description">Who killed John and framed Helena?</p>

      <a class="button button--1" href="pop-up-3d.html">
        <span class="button__label">Clara Steward</span>
      </a>

      <a class="button button--2" href="finish-page.html">
        <span class="button__label">Benedict Fitzgerald</span>
      </a>

      <a class="button button--3" href="pop-up-3d.html">
        <span class="button__label">Adeline Fitzgerald</span>
      </a>

      <a class="button button--4" href="pop-up-3d.html">
        <span class="button__label">Nicholas Owens</span>
      </a>
    </section>
  </main>

  <script>
    (function () {
      var audio = document.getElementById('bg-music');
      var toggle = document.getElementById('audio-toggle');
      if (!audio || !toggle) return;
      audio.volume = 0.5;

      function setMuted(muted) {
        audio.muted = muted;
        toggle.classList.toggle('is-muted', muted);
        toggle.setAttribute('aria-pressed', String(!muted));
      }

      // Try to autoplay; if blocked, wait for first user interaction.
      var playPromise = audio.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(function () {
          var resume = function () {
            audio.play().catch(function () {});
            document.removeEventListener('click', resume);
            document.removeEventListener('touchstart', resume);
            document.removeEventListener('keydown', resume);
          };
          document.addEventListener('click', resume);
          document.addEventListener('touchstart', resume);
          document.addEventListener('keydown', resume);
        });
      }

      toggle.addEventListener('click', function () {
        setMuted(!audio.muted);
        if (!audio.muted && audio.paused) {
          audio.play().catch(function () {});
        }
      });
    })();
  </script>
</body>
</html>
